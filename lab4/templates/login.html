{% extends "base.html" %}
{% block title %}Lab4 — Вход{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
  <h2 class="mb-3">Вход в систему</h2>
  <form method="post">
    <div class="mb-3">
      <label for="login" class="form-label">Логин</label>
      <input id="login" name="login" type="text" class="form-control" required autocomplete="username">
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Пароль</label>
      <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Войти</button>
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
