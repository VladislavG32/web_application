<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Lab3{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    main { max-width: 980px; margin: 0 auto; padding: 24px; }
    a { text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 8px; }
    .err { color: #b00000; }
    input, textarea { width: 100%; max-width: 720px; }
    textarea { height: 180px; }
  </style>
</head>
<body>
  <main>
    <nav>
      <a href="{{ url_for('index') }}">Lab3</a> |
      <a href="{{ url_for('create') }}">Создать заметку</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
