{% extends "base.html" %}
{% block title %}Lab3 — Заметки{% endblock %}
{% block content %}
  <h1>Заметки</h1>

  {% if not notes %}
    <p>Пока нет заметок. <a href="{{ url_for('create') }}">Создать первую</a>.</p>
  {% endif %}

  {% for n in notes %}
    <div class="card">
      <h3><a href="{{ url_for('view', note_id=n.id) }}">{{ n.title }}</a></h3>
      <small>{{ n.created_at }}</small>
    </div>
  {% endfor %}
{% endblock %}
