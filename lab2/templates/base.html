<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lab2{% endblock %}</title>

  <!-- Bootstrap (для is-invalid / invalid-feedback и аккуратного UI) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >

  <!-- Твои общие стили -->
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">

  <style>
    pre {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
      margin-bottom: 0;
    }
    code { white-space: pre; }
  </style>
</head>
<body>
  <main class="container py-4">
    <header class="card shadow-sm mb-4">
      <div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
        <div>
          <h1 class="h4 mb-1">Лабораторная работа №2</h1>
          <div class="text-muted">Работа с данными запроса (Flask)</div>
        </div>

        <nav class="d-flex flex-wrap gap-2">
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('index') }}">Главная</a>
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('request_args_page', demo='1', user='vlad') }}">URL params</a>
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('request_headers_page') }}">Headers</a>
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('request_cookies_page') }}">Cookies</a>
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('auth') }}">Авторизация</a>
          <a class="btn btn-primary btn-sm" href="{{ url_for('phone_form') }}">Проверка телефона</a>
        </nav>
      </div>
    </header>

    {% block content %}{% endblock %}
  </main>

  <footer class="footer-lite">
    <div class="container">
      Остапенко Владислав Русланович • Группа 241-3211
    </div>
  </footer>
</body>
</html>
