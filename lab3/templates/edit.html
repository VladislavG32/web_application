{% extends "base.html" %}
{% block title %}Lab3 — Редактировать заметку{% endblock %}

{% block content %}
<div class="card">
  <h2 style="margin-top:0;">Редактировать заметку #{{ note_id }}</h2>
  <p class="muted">Измени данные и сохрани.</p>

  <form method="post">
    <div class="field">
      <label for="title">Заголовок</label>
      <input id="title" name="title" value="{{ title }}">
      {% if errors.title %}<div class="err">{{ errors.title }}</div>{% endif %}
    </div>

    <div class="field">
      <label for="text">Текст заметки</label>
      <textarea id="text" name="text">{{ text }}</textarea>
      {% if errors.text %}<div class="err">{{ errors.text }}</div>{% endif %}
    </div>

    <div class="actions">
      <button type="submit" class="btn">Сохранить изменения</button>
      <a class="btn" href="{{ url_for('view', note_id=note_id) }}">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
